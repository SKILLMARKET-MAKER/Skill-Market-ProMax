{% extends 'base.html' %}
{% block title %}与 {{ target.username }} 的对话 — SkillMarket{% endblock %}
{% block breadcrumb %}
  <a href="/messages">我的消息</a>
  <span class="bread-sep">›</span>
  <span style="color:#64748b">与 {{ target.username }} 的对话</span>
{% endblock %}
{% block head %}
<style>
/* 原有聊天样式完整保留 */
.chat-outer{display:flex;flex-direction:column;height:calc(100vh - 220px);min-height:440px}
.chat-hd{padding:.9rem 1.25rem;border-bottom:1px solid rgba(74, 108, 243, 0.08);display:flex;align-items:center;gap:.9rem;flex-shrink:0;background:#ffffff}
.chat-msgs{flex:1;overflow-y:auto;padding:1.25rem;display:flex;flex-direction:column;gap:.85rem;background:#f8faff}
.msg-row{display:flex;gap:.65rem;align-items:flex-start;animation:msgIn .2s ease;width:100%}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg-row.me{flex-direction:row-reverse}
.msg-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.75rem;flex-shrink:0;color:#fff;margin-top:4px}
.bubble{max-width:min(85%, 600px);min-width:120px;padding:.65rem 1rem;border-radius:16px;font-size:.88rem;line-height:1.55;white-space:normal;word-break:break-word;display:inline-block;vertical-align:bottom}
.bubble.them{background:#ffffff;border:1px solid rgba(74, 108, 243, 0.1);border-bottom-left-radius:4px;color:#1e293b}
.bubble.me{background:linear-gradient(120deg,#4a6cf3,#7aa8f5);color:#fff;border-bottom-right-radius:4px;box-shadow:0 4px 16px rgba(74, 108, 243, 0.25)}
.msg-time{font-size:.68rem;color:#94a3b8;margin-bottom:3px;display:block}
.bubble-wrap{display:inline-block;max-width:100%}
.date-sep{text-align:center;font-size:.72rem;color:#94a3b8;display:flex;align-items:center;gap:.6rem;padding:.1rem 0}
.date-sep::before,.date-sep::after{content:'';flex:1;height:1px;background:rgba(74, 108, 243, 0.08)}
.chat-in{padding:.85rem 1.25rem;border-top:1px solid rgba(74, 108, 243, 0.08);display:flex;gap:.65rem;flex-shrink:0;background:#ffffff}
.chat-in textarea{flex:1;resize:none;background:#f8faff;border:1px solid rgba(74, 108, 243, 0.1);border-radius:10px;color:#1e293b;font-family:inherit;font-size:.88rem;padding:.55rem .85rem;max-height:120px;transition:.2s}
.chat-in textarea:focus{outline:none;border-color:#4a6cf3;box-shadow:0 0 0 3px rgba(74, 108, 243, 0.15)}
.chat-btn{padding:.35rem .75rem;border-radius:8px;border:none;cursor:pointer;font-size:.78rem;display:inline-flex;align-items:center;gap:.3rem}
.chat-btn.voice{background:#e6f7ff;color:#0096cc}
.chat-btn.video{background:#fff1f0;color:#f53f3f}
.call-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:9999}
.call-box{background:#fff;width:320px;border-radius:16px;padding:2rem;text-align:center}
.call-title{font-size:1.1rem;font-weight:600;margin-bottom:.5rem}
.call-desc{color:#666;margin-bottom:1.5rem}
.call-actions{display:flex;gap:1rem;justify-content:center}
.btn-answer{background:#00c851;padding:.5rem 1.5rem;border-radius:8px;color:#fff;border:none;cursor:pointer}
.btn-reject{background:#ff4444;padding:.5rem 1.5rem;border-radius:8px;color:#fff;border:none;cursor:pointer}
.call-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:9999;display:none}
.local-video{position:absolute;bottom:20px;right:20px;width:120px;height:210px;border-radius:8px;object-fit:cover;border:2px solid #fff}
.remote-video{width:100%;height:100%;object-fit:cover}
.call-controls{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);display:flex;gap:1rem}
.control-btn{width:50px;height:50px;border-radius:50%;background:#fff;color:#000;display:flex;align-items:center;justify-content:center;border:none;font-size:1.2rem;cursor:pointer}
.control-btn.hangup{background:#f53f3f;color:#fff}
</style>
<!-- 必须用 4.x 稳定版 -->
<script src="https://storage.zego.im/zegowebsdk/js/4.17.0/ZegoExpressWeb-min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
{% endblock %}
{% block scripts %}
<script>
const ME   = {{ current_user.id }};
const TGT  = {{ target.id }};
const INIT_ME   = {{ current_user.username | tojson }}[0].toUpperCase();
const INIT_THEM = {{ target.username | tojson }}[0].toUpperCase();
let lastId = {{ messages[-1].id if messages else 0 }};
const list = document.getElementById('msgList');
const txt  = document.getElementById('msgTxt');

// ── 聊天逻辑（完整保留） ──────────────────────────────────────────
function fmtTime(utcStr) {
  const d = new Date(utcStr.includes('Z') ? utcStr : utcStr + 'Z');
  const now = new Date();
  const hm  = d.toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit', hour12:false });
  const sameDay = (a, b) => a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
  const yesterday = new Date(now); yesterday.setDate(now.getDate()-1);
  if (sameDay(d, now)) return hm;
  if (sameDay(d, yesterday)) return '昨天 ' + hm;
  if (d.getFullYear() === now.getFullYear()) return (d.getMonth()+1) + '月' + d.getDate() + '日 ' + hm;
  return d.getFullYear() + '/' + (d.getMonth()+1) + '/' + d.getDate() + ' ' + hm;
}
document.querySelectorAll('.msg-time[data-utc]').forEach(el => { el.textContent = fmtTime(el.dataset.utc); });
(function insertDateSeps() {
  const rows = [...list.querySelectorAll('.msg-row[data-id]')];
  let lastDateKey = null;
  rows.forEach(row => {
    const timeEl = row.querySelector('.msg-time[data-utc]');
    if (!timeEl) return;
    const d = new Date(timeEl.dataset.utc + 'Z');
    const dateKey = d.getFullYear() + '-' + d.getMonth() + '-' + d.getDate();
    if (dateKey !== lastDateKey) {
      lastDateKey = dateKey;
      const sep = document.createElement('div'); sep.className = 'date-sep';
      const now = new Date(); const yesterday = new Date(now); yesterday.setDate(now.getDate()-1);
      if (d.toDateString() === now.toDateString()) sep.textContent = '今天';
      else if (d.toDateString() === yesterday.toDateString()) sep.textContent = '昨天';
      else sep.textContent = (d.getMonth()+1) + '月' + d.getDate() + '日';
      list.insertBefore(sep, row);
    }
  });
})();
function scrollBot() { list.scrollTop = list.scrollHeight; } scrollBot();
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n{2,}/g,'<br><br>').replace(/\n/g,' '); }
function addBubble(m, utcStr) {
  const me = (m.sender_id === ME);
  const init = me ? INIT_ME : INIT_THEM;
  const timeStr = fmtTime(utcStr ? utcStr : new Date().toISOString());
  const row = document.createElement('div');
  row.className = 'msg-row' + (me ? ' me' : '');
  if (m.id) row.dataset.id = m.id;
  row.innerHTML = `<div class="msg-av" style="background:linear-gradient(135deg,${me ? '#4a6cf3,#f15bb5' : '#06d6a0,#4a6cf3'})">${init}</div>` +
    `<div style="display:flex;flex-direction:column;${me ? 'align-items:flex-end' : 'align-items:flex-start'}">` +
    `<div class="msg-time" style="${me ? 'text-align:right' : ''}">${timeStr}</div>` +
    `<div class="bubble-wrap"><div class="bubble ${me ? 'me' : 'them'}">${esc(m.content)}</div></div></div>`;
  document.getElementById('emptyHint')?.remove();
  list.appendChild(row); scrollBot();
}
async function send() {
  const content = txt.value.trim(); if (!content) return;
  txt.value = ''; txt.style.height = 'auto';
  addBubble({ sender_id: ME, content }, new Date().toISOString());
  const fd = new FormData(); fd.append('content', content);
  try {
    const res = await fetch('/messages/' + TGT, { method: 'POST', body: fd, headers: { 'X-Requested-With': 'XMLHttpRequest' } });
    if (res.ok) { const d = await res.json(); if (d.id && d.id > lastId) lastId = d.id; }
  } catch(e) { console.error('发送失败', e); }
}
document.getElementById('sendBtn').addEventListener('click', send);
txt.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } });
txt.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 120) + 'px'; });
async function poll() {
  try {
    const res = await fetch('/api/messages/' + TGT + '/poll?since=' + lastId);
    if (!res.ok) return; const msgs = await res.json();
    msgs.forEach(m => { if (m.sender_id !== ME) addBubble(m, m.created_at); if (m.id > lastId) lastId = m.id; });
  } catch(e) {}
}
setInterval(poll, 1000);

// ══════════════════════════════════════════════════════════════
// 音视频通话（修复版）
// ══════════════════════════════════════════════════════════════

// ── 1. 配置 ──────────────────────────────────────────────────
const ZEGO_APPID  = 1125789196;                          // 你的 AppID（数字）
const ZEGO_SERVER = 'wss://webliveroom1125789196-api.coolzcloud.com/ws'; // 对应 AppID 的 server
// 测试环境 token 用空字符串即可（需在 ZEGO 控制台把鉴权模式设为"测试模式"）
const ZEGO_TOKEN  = '';

// ── 2. Socket.IO ──────────────────────────────────────────────
const socket = io({ transports: ['websocket', 'polling'], reconnection: true });

// ── 3. ZEGO 引擎（正确初始化方式）────────────────────────────
const zg = new ZegoExpressEngine(ZEGO_APPID, ZEGO_SERVER);

// 监听远端流新增（发起方 & 接听方都需要）
zg.on('roomStreamUpdate', async (roomID, updateType, streamList) => {
  if (updateType === 'ADD' && streamList.length > 0) {
    const remoteStream = await zg.startPlayingStream(streamList[0].streamID);
    document.getElementById('remoteVideo').srcObject = remoteStream;
  }
});

// ── 4. 通话状态 ───────────────────────────────────────────────
let roomId   = '';
let callType = 1;          // 1=视频 0=语音
let localStream = null;

// ── 5. 发起通话 ───────────────────────────────────────────────
async function startCall(type) {
  callType = type;
  // 双方 roomId 必须相同，用较小 id 在前保证一致
  const ids = [ME, TGT].sort((a,b)=>a-b);
  roomId = `room_${ids[0]}_${ids[1]}`;

  try {
    // 获取本地流（语音通话关闭摄像头）
    localStream = await zg.createStream({
      camera: { video: type === 1, audio: true }
    });
    document.getElementById('localVideo').srcObject = localStream;

    // 登录 ZEGO 房间（测试模式 token 传空字符串）
    await zg.loginRoom(roomId, ZEGO_TOKEN, {
      userID: String(ME),
      userName: '{{ current_user.username }}'
    }, { userUpdate: true });

    // 推流
    zg.startPublishingStream('stream_' + ME, localStream);

    // 显示通话界面
    document.getElementById('callScreen').style.display = 'block';

    // 通知对方（带上 roomId，对方接听时需要加入同一个房间）
    socket.emit('call', { to: TGT, type, room: roomId });

  } catch(e) {
    console.error('发起通话失败:', e);
    alert('发起通话失败：' + (e.message || e));
    cleanupCall();
  }
}

// ── 6. 接听 ───────────────────────────────────────────────────
async function answerCall() {
  document.getElementById('callModal').style.display = 'none';
  try {
    localStream = await zg.createStream({
      camera: { video: callType === 1, audio: true }
    });
    document.getElementById('localVideo').srcObject = localStream;

    await zg.loginRoom(roomId, ZEGO_TOKEN, {
      userID: String(ME),
      userName: '{{ current_user.username }}'
    }, { userUpdate: true });

    zg.startPublishingStream('stream_' + ME, localStream);
    document.getElementById('callScreen').style.display = 'block';

  } catch(e) {
    console.error('接听失败:', e);
    alert('接听失败：' + (e.message || e));
    cleanupCall();
  }
}

// ── 7. 拒绝 ───────────────────────────────────────────────────
function rejectCall() {
  document.getElementById('callModal').style.display = 'none';
  socket.emit('reject', { to: TGT });
}

// ── 8. 挂断 ───────────────────────────────────────────────────
function hangupCall() {
  socket.emit('hangup', { to: TGT });
  cleanupCall();
}

function cleanupCall() {
  if (localStream) {
    zg.destroyStream(localStream);
    localStream = null;
  }
  zg.stopPublishingStream('stream_' + ME);
  zg.logoutRoom(roomId);
  document.getElementById('callScreen').style.display = 'none';
  document.getElementById('localVideo').srcObject = null;
  document.getElementById('remoteVideo').srcObject = null;
}

// ── 9. 控制按钮 ───────────────────────────────────────────────
let micMuted = false, camMuted = false;
function toggleMic() {
  micMuted = !micMuted;
  zg.muteMicrophone(micMuted);
}
function toggleCamera() {
  camMuted = !camMuted;
  zg.mutePublishStreamVideo('stream_' + ME, camMuted);
}

// ── 10. 监听来电 / 挂断通知 ──────────────────────────────────
socket.on('incomingCall', data => {
  callType = data.type;
  roomId   = data.room;   // ← 关键：保存对方的 roomId
  document.getElementById('callType').textContent = data.type === 1 ? '视频通话...' : '语音通话...';
  document.getElementById('callModal').style.display = 'flex';
});

socket.on('callRejected', () => {
  alert('对方拒绝了通话');
  cleanupCall();
});

socket.on('callHangup', () => {
  cleanupCall();
});
</script>
{% endblock %}
